palette = "catppuccin_mocha"

format = """
$character\
$git_branch\
$directory\
$cmd_duration\
\n[  ](fg:green bg:base)"""

add_newline = false

[directory]
format = "[ $path](bg:base fg:text)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"~/Documents" = "󰈙 "
"~/Downloads" = " "
"~/.config" = " "

[git_branch]
symbol = ""
format = '[ $symbol $branch ](bg:surface0 fg:rosewater)'

[cmd_duration]
format = "[ | ](bg:base fg:text)[$duration](bg:base fg:green)"
min_time = 500

[character]
format = "$symbol"
success_symbol = "[ INSERT ](fg:crust bg:blue bold)"
error_symbol = "[ INSERT ](fg:crust bg:blue bold)"
vimcmd_symbol = "[ NORMAL ](fg:crust bg:peach bold)"
vimcmd_replace_one_symbol = "[ REPLACE ](fg:crust bg:red bold)"
vimcmd_replace_symbol = "[ REPLACE ](fg:crust bg:red bold)"
vimcmd_visual_symbol = "[ VISUAL ](fg:crust bg:mauve bold)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
