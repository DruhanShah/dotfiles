palette = "nord"

format = """
$character\
$git_branch\
$directory\
$cmd_duration\
\n[  ](fg:aurora4 bg:polarnight1)"""

add_newline = false

[directory]
format = "[ $path](bg:polarnight1 fg:snowstorm1)"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"~/Documents" = "󰈙 "
"~/Downloads" = " "
"~/.config" = " "

[git_branch]
symbol = ""
format = '[ $symbol $branch ](bg:surface0 fg:snowstorm3)'

[cmd_duration]
format = "[ | ](bg:base fg:text)[$duration](bg:polarnight1 fg:aurora4)"
min_time = 500

[character]
format = "$symbol"
success_symbol = "[ INSERT ](fg:polarnight1 bg:frost2 bold)"
error_symbol = "[ INSERT ](fg:polarnight1 bg:frost2 bold)"
vimcmd_symbol = "[ NORMAL ](fg:polarnight1 bg:aurora2 bold)"
vimcmd_replace_one_symbol = "[ REPLACE ](fg:polarnight1 bg:aurora1 bold)"
vimcmd_replace_symbol = "[ REPLACE ](fg:polarnight1 bg:aurora1 bold)"
vimcmd_visual_symbol = "[ VISUAL ](fg:polarnight1 bg:aurora5 bold)"

