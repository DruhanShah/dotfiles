# vim:foldmethod=marker

#: Fonts {{{

font_family      Operator Mono SSm Lig Book
bold_font        Operator Mono SSm Lig Bold
italic_font      Operator Mono SSm Lig Book Italic
bold_italic_font Operator Mono SSm Lig Bold Italic

font_size 10.5
modify_font cell_height 180%

modify_font underline_position 2
modify_font strikethrough_position 6

#: }}}

#: Scrollback {{{
scrollback_pager nvim -u ~/.config/nvim/scrollback.lua -c "silent write! /tmp/kitty_scrollback_buffer | tee cat /tmp/kitty_scrollback_buffer - "
#: }}}

#: Window layout {{{

window_margin_width 0
single_window_margin_width 0

window_padding_width 20
single_window_padding_width 20

hide_window_decorations yes
confirm_os_window_close 0

#: }}}

#: Advanced {{{
editor nvim
#: }}}

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
