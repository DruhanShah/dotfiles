[colors]
background = #282A36
background-alt = #44475A
foreground = #F8F8F2

cyan = #8BE9FD
green = #50FA7B
yellow = #F1FA8C
orange = #FFB86C
red = #FF5555
pink = #FF79C6
purple = #BD93F9

primary = ${colors.cyan}
secondary = ${colors.green}
alert = ${colors.red}
disabled = ${colors.background-alt}

[bar/mybar]
width = 100%
height = 20pt
radius = 00

; dpi = 96

background = #00282A36
foreground = ${colors.background}

line-size = 3pt

border-size = 0pt
border-color = ${colors.purple}

padding-left = 0
padding-right = 1

font-0 = Fira Code:size=10;2
font-1 = Cascadia Code PL:size=15;5

modules-left = xworkspaces memory cpu 
modules-center = date
modules-right = pulseaudio wlan eth

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-background = ${root.background}
; tray-offset-x = -8

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.foreground}
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.secondary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-background = ${colors.background-alt}
label-occupied-foreground = ${colors.foreground}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

; [module/xwindow]
; type = internal/xwindow
; label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = %{T2}%{T-}
format-volume-prefix-foreground = ${colors.green}
format-volume-suffix = %{T2} %{T-}
format-volume-suffix-foreground = ${colors.orange}
format-volume-suffix-background = ${colors.green}
format-volume = <label-volume>

label-volume = VOL %percentage%% 
label-volume-background = ${colors.green}

format-muted-prefix = %{T2}%{T-}
format-muted-prefix-foreground = ${colors.green}
format-muted-suffix = %{T2} %{T-}
format-muted-suffix-foreground = ${colors.orange}
format-muted-suffix-background = ${colors.green}
format-muted = <label-muted>

label-muted = VOL muted 
label-muted-background = ${colors.green}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
label = %{F#00044d} RAM %{F-} %percentage_used:2%%
label-background = ${colors.yellow}
; format-prefix = %{T2}%{T-}
; format-prefix-foreground = ${colors.background-alt}
; format-prefix-background = ${colors.yellow}
format-suffix = %{T2}%{T-}
format-suffix-foreground = ${colors.yellow}
format-suffix-background = ${colors.purple}

[module/cpu]
type = internal/cpu
interval = 2
label-background = ${colors.purple}
label-foreground = ${colors.background}
label = %{F#00044d} CPU%{F-}%percentage:3%%
format-suffix = %{T2}%{T-}
format-suffix-foreground = ${colors.purple}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F1FA8C}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %ifname% %local_ip% |
label-connected-background = ${colors.orange}

[module/date]
type = internal/date
interval = 1

date-alt = %H:%M
date = %A, %d %B %Y %H:%M:%S

format-prefix = %{T2}%{T-}
format-prefix-foreground = ${colors.primary}
format-suffix = %{T2}%{T-}
format-suffix-foreground = ${colors.primary}

label = %date%
label-background = ${colors.primary}
label-foreground = ${colors.background}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
